    <script th:src="@{/js/util.js}"></script>
    <script>
        function confirmar(){

            if(document.getElementById("nmProduto").value == ''){
                alert()
                return;
            }

            if(document.getElementById("dsProduto").value == ''){
                alert()
                return;
            }

            if(document.getElementById("cdProduto") == null)
                submeterFormulario('/produto/cadastro', "POST")
            else
                submeterFormulario('/produto/alterar', "POST")
        }

        function limparCodigo(pCampo){
            if(pCampo.value != ''){
                if(parseInt(pCampo.value) < 1){
                    pCampo.value = '';
                }
            }
        }

        function trasferirUsuario(linha){
            document.getElementById("cdUsuario").value = linha.cells[0].innerText;
            document.getElementById("nmUsuario").value = linha.cells[1].innerText;
        }

        function trasferirProduto(linha){

            if(parseInt(linha.cells[3].innerText) <= 0){
                exibirMensagem("O produto escolhido não alcança a quantidade mínima necessária para realizar o pedido")
                return
            }

            let produtos = document.getElementById("produtos");

            if(produtos.value != ""){
                let arrayProduto = produtos.value.split("*")
                if(arrayProduto.includes(linha.cells[0].innerText)){
                    exibirMensagem("O produto já faz parte do pedido")
                    return
                }
                arrayProduto.push(linha.cells[0].innerText)
                document.getElementById("produtos").value = arrayProduto.join("*");
            }else{
                document.getElementById("produtos").value = linha.cells[0].innerText;
            }

            let tabela = document.getElementById("tabelaProdutos");

            let novaLinha = tabela.insertRow(0);

            let cdProduto = novaLinha.insertCell(0);
            cdProduto.textContent = linha.cells[0].innerText;

            let nmProduto = novaLinha.insertCell(1);
            nmProduto.textContent = linha.cells[1].innerText;

            let qtProduto = novaLinha.insertCell(2);
            qtProduto.textContent = linha.cells[3].innerText;

            let vlProduto = novaLinha.insertCell(3);
            vlProduto.textContent = linha.cells[4].innerText;

            let qtPedido = novaLinha.insertCell(4);

            let inputQtd = document.createElement("input");
            inputQtd.id = "qtProduto" + linha.cells[0].innerText;
            inputQtd.name = "qtProduto" + linha.cells[0].innerText;
            inputQtd.type = "number";
            inputQtd.value = "0";
            inputQtd.min = "1";
            inputQtd.className = "inputGroup-sizing-default";

            inputQtd.onchange = function() {
                let qtDisponivel = parseInt(this.closest('tr').cells[2].innerText);
                let qtPedido = parseInt(this.value);

                if(qtPedido > qtDisponivel){
                    this.value = qtDisponivel;
                    exibirMensagem("O quantidade máxima para esse produto é " + qtDisponivel)
                }else{
                    this.value = qtPedido;
                }
                
                calcularVltotal();
            };

            qtPedido.appendChild(inputQtd);
        }

        function calcularVltotal(){
            let tabela = document.getElementById("tabelaProdutos");
            let linhas = tabela.querySelectorAll('tr');

            vlTotal = 0
            for (const linha of linhas){
                let celulas = linha.querySelectorAll('td');
                
                if (celulas.length > 3) {
                    vlProduto = parseInt(celulas[3].innerText);
                    qtProduto = parseInt(celulas[4].querySelectorAll('input')[0].value);

                    vlTotal = vlTotal + (vlProduto * qtProduto);
                }
            }

            let pcDesconto = parseInt(document.getElementById("pcDesconto").value);

            if(pcDesconto > 0)
                vlTotal = vlTotal - (vlTotal * (pcDesconto / 100))

            document.getElementById("vlTotal").value = vlTotal
        }
    </script>
</head>

            <h3>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb p-3 bg-body-tertiary rounded-3">

                            Pedidos

                        <li class="breadcrumb-item active" aria-current="page">
                            Cadastro
                        </li>
                    </ol>
                </nav>
            </h3>
            <br>
            <form id="formulario" method="post" action="/pedido/cadastro">
                <div  class="input-group">
                    <span class="input-group-text" id="inputGroup-sizing-default" style="width: 8%;">Cliente</span>
                    <input required id="cdUsuario" name="cdUsuario" type="number" min = "1" class="form-control" aria-describedby="inputGroup-sizing-default" onchange="limparCodigo(this); document.getElementById('nmUsuario').value=''" style="max-width: 100px;">
                    <input id="nmUsuario" readonly type="text" class="form-control" aria-describedby="inputGroup-sizing-default">
                    <span class="input-group-text" id="inputGroup-sizing-default" style="width: 3%;">
                    <a href="#" onclick="abrirJanelaAuxiliar('/usuario?auxiliar=1')">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                        </svg>
                    </a>
                    </span>
                </div>
                <div  class="input-group">
                    <span class="input-group-text" id="inputGroup-sizing-default" style="width: 8%;">Data</span>
                    <input required id="dtCadastro" name="dtCadastro" type="date" class="form-control" aria-describedby="inputGroup-sizing-default">
                </div>
                <br>
                <h5>Produtos <button class="btn btn-primary float-end" type="button" id="button-addon2" onclick="abrirJanelaAuxiliar('/produto?auxiliar=1')">Selecionar</button></h5>
                <table class="table">
                    <thead>
                        <tr>
                            <th  style="width: 10%;">Código </th>
                            <th  style="width: 10%;">Nome </th>
                            <th  style="width: 20%;">Quantidade disponivel</th>
                            <th  style="width: 30%;">Valor</th>
                            <th  style="width: 30%;">Quantidade</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaProdutos">
                        <tr>
                            <td colspan="3"></td>
                            <td>
                                <div  class="input-group">
                                    <span class="input-group-text" id="inputGroup-sizing-default"  style="width: 20%;">Desconto</span> 
                                    <input required id="pcDesconto" name="pcDesconto" type="number" value="0" min = "0" max="100" onchange="calcularVltotal()" class="form-control" aria-describedby="inputGroup-sizing-default">
                                    <span class="input-group-text" id="inputGroup-sizing-default"  style="width: 9%;">%</span> 
                                </div>
                            </td>
                            <td>
                                <div  class="input-group">
                                    <span class="input-group-text" id="inputGroup-sizing-default" style="width: 25%;">Valor Final</span> 
                                <input id="vlTotal" name="vlTotal" value="0" readonly type="number" class="form-control" aria-describedby="inputGroup-sizing-default">
                                </div>
                            </td>
                        </tr>
                    </tbody>
