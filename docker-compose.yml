services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: desafio_sergipetec
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: desafio_app
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/desafio_sergipetec